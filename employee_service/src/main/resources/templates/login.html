<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/gemini.css}">
    <title>Вход в систему CRM</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">CRM Система</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header text-center bg-primary text-white">
                    <h3 class="mb-0">Вход</h3>
                </div>
                <div class="card-body">
                    <div id="errorMessage" class="alert alert-danger" role="alert" style="display:none;">
                        Неверное имя пользователя или пароль.
                    </div>
                    <div id="logoutMessage" class="alert alert-info" role="alert" style="display:none;">
                        Вы успешно вышли из системы.
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Логин:</label>
                            <input type="text" id="username" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль:</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessageDiv = document.getElementById('errorMessage');
        const logoutMessageDiv = document.getElementById('logoutMessage');

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            errorMessageDiv.style.display = 'block';
            errorMessageDiv.textContent = 'Ошибка аутентификации. Пожалуйста, попробуйте еще раз.';
        }
        if (urlParams.has('logout')) {
            logoutMessageDiv.style.display = 'block';
        }

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            errorMessageDiv.style.display = 'none';
            logoutMessageDiv.style.display = 'none';

            const username = usernameInput.value;
            const password = passwordInput.value;

            try {
                // Отправляем AJAX-запрос на /authenticate
                const response = await fetch('/authenticate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {

                    const userRoleResponse = await fetch('/api/user/role', {
                        method: 'GET'
                    });

                    if (userRoleResponse.ok) {
                        const userRole = await userRoleResponse.text();
                        if (userRole.includes('ROLE_ADMIN')) {
                            window.location.href = '/masterpage';
                        } else {
                            window.location.href = '/dashboard';
                        }
                    } else {
                        errorMessageDiv.textContent = 'Ошибка получения информации о пользователе. Пожалуйста, попробуйте еще раз.';
                        errorMessageDiv.style.display = 'block';
                        await fetch('/logout', { method: 'POST' });
                    }

                } else {
                    const errorText = await response.text();
                    errorMessageDiv.textContent = errorText || 'Неверное имя пользователя или пароль.';
                    errorMessageDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка сети или сервера:', error);
                errorMessageDiv.textContent = 'Произошла ошибка при попытке входа. Пожалуйста, попробуйте еще раз.';
                errorMessageDiv.style.display = 'block';
            }
        });

        async function logout() {
            try {
                const response = await fetch('/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/login?logout';
                } else {
                    alert('Ошибка при выходе из системы.');
                }
            } catch (error) {
                console.error('Ошибка выхода:', error);
                alert('Произошла ошибка при выходе из системы.');
            }
        }
    });
</script>
</body>
</html>
