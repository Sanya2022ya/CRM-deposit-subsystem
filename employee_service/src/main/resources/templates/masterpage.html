<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/gemini.css}">
    <title>Панель администратора</title>
    <style>
        /* Переопределяем некоторые стили для модального окна, чтобы они работали с Bootstrap */
        .modal .modal-content {
            margin: 10% auto; /* Центрирование модального окна */
            padding: 20px;
            width: 300px;
            border-radius: 10px;
        }
        /* Убираем float для кнопки закрытия, Bootstrap делает это по-своему */
        .modal .close {
            display: none; /* Bootstrap использует .btn-close */
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">CRM Система</a>
        <div class="d-flex align-items-center">
            <span class="navbar-text me-3">
                Панель администратора
            </span>
            <a th:href="@{/dashboard}" class="btn btn-link">← Назад к списку клиентов</a>
        </div>
    </div>
</nav>

<div class="container-main container mt-4">
    <h2 class="mb-4">Управление сотрудниками</h2>

    <button type="button" class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#regModal">
        ➕ Добавить сотрудника
    </button>

    <div class="modal fade" id="regModal" tabindex="-1" aria-labelledby="regModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="regModalLabel">Регистрация сотрудника</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/masterpage}" method="post" th:object="${employee}">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="username" class="form-label">Логин:</label>
                            <input type="text" id="username" name="username" th:field="*{username}" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль:</label>
                            <input type="password" id="password" name="password" th:field="*{password}" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label for="role" class="form-label">Роль:</label>
                            <select id="role" name="role" th:field="*{role}" class="form-select">
                                <option value="ROLE_USER">Пользователь</option>
                                <option value="ROLE_ADMIN">Администратор</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">Зарегистрировать</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    </div>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            Администраторы
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead>
                    <tr class="table-primary">
                        <th>ID</th>
                        <th>Логин</th>
                        <th>Роль</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emp : ${employees}" th:if="${emp.role == 'ROLE_ADMIN'}">
                        <td th:text="${emp.id}"></td>
                        <td th:text="${emp.username}"></td>
                        <td th:text="${emp.role}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            Пользователи
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead>
                    <tr class="table-primary">
                        <th>ID</th>
                        <th>Логин</th>
                        <th>Роль</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emp : ${employees}" th:if="${emp.role == 'ROLE_USER'}">
                        <td th:text="${emp.id}"></td>
                        <td th:text="${emp.username}"></td>
                        <td th:text="${emp.role}"></td>
                        <td>
                            <span th:classappend="${emp.blocked ? 'text-danger' : 'text-success'}"
                                  th:text="${emp.blocked} ? 'Заблокирован' : 'Активен'"></span>
                        </td>
                        <td>
                            <form th:action="@{/employees/{id}/toggle-block(id=${emp.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit"
                                        th:class="${emp.blocked} ? 'btn btn-success btn-sm' : 'btn btn-warning btn-sm'"
                                        th:text="${emp.blocked} ? '✅ Разблокировать' : '🚫 Заблокировать'">
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Инициализация модального окна Bootstrap
    const regModal = new bootstrap.Modal(document.getElementById('regModal'));

    // JavaScript для закрытия модального окна Bootstrap (по клику вне окна)
    // Bootstrap 5 автоматически обрабатывает закрытие по клику вне окна и по кнопке 'X'
    // Старый JavaScript для модального окна можно удалить или адаптировать, но он больше не нужен для базовой функциональности
</script>

</body>
</html>
