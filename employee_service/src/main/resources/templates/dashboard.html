<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/gemini.css}"> <title>Панель управления CRM</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">CRM Система</a>
        <div class="d-flex align-items-center">
<span class="navbar-text me-3">
Добро пожаловать, <strong th:text="${username}"></strong>!
</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-link">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-main container mt-4">
    <div class="card">
        <div class="card-header">
            Список клиентов
        </div>
        <div class="card-body">
            <div class="search-add-row">
                <form class="search-input-group" method="get" th:action="@{/dashboard}">
                    <div class="input-group">
                        <input type="text" name="query" class="form-control" placeholder="Поиск по ФИО или паспорту" th:value="${query}">
                        <button type="submit" class="btn btn-outline-secondary">Найти</button>
                    </div>
                </form>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createClientModal">
                    Добавить клиента
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Фамилия</th>
                        <th>Имя</th>
                        <th>Отчество</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="client : ${clients}">
                        <td th:text="${client.lastName}"></td>
                        <td th:text="${client.firstName}"></td>
                        <td th:text="${client.middleName}"></td>
                        <td>
                        <span th:text="${client.status == 'ACTIVE' ? 'Активен' :
                                       client.status == 'DELETED' ? 'Удалён' :
                                       client.status == 'BLOCKED' ? 'Заблокирован' : 'Неизвестен'}"
                              th:classappend="${client.status == 'ACTIVE' ? 'status-active' :
                                               client.status == 'BLOCKED' ? 'status-blocked' : ''}">
                        </span>
                        </td>
                        <td>
                            <form th:action="@{/client-profile/{id}(id=${client.id})}" method="get">
                                <button type="submit" class="btn btn-outline-primary btn-sm">Профиль</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clients)}">
                        <td colspan="5" class="text-center text-muted">Клиенты не найдены.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="createClientModal" tabindex="-1" aria-labelledby="createClientModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <form id="createClientForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="createClientModalLabel">Создать клиента</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="firstName" class="form-label">Имя</label>
                        <input type="text" class="form-control" id="firstName" name="firstName" required>
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label">Фамилия</label>
                        <input type="text" class="form-control" id="lastName" name="lastName" required>
                    </div>
                    <div class="mb-3">
                        <label for="middleName" class="form-label">Отчество</label>
                        <input type="text" class="form-control" id="middleName" name="middleName">
                    </div>
                    <div class="mb-3">
                        <label for="birthDate" class="form-label">Дата рождения</label>
                        <input type="date" class="form-control" id="birthDate" name="birthDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="gender" class="form-label">Пол</label>
                        <input type="text" class="form-control" id="gender" name="gender">
                    </div>
                    <div class="mb-3">
                        <label for="contactInfo" class="form-label">Контактная информация</label>
                        <input type="text" class="form-control" id="contactInfo" name="contactInfo">
                    </div>
                    <div class="mb-3">
                        <label for="passport" class="form-label">Паспорт</label>
                        <input type="text" class="form-control" id="passport" name="passport">
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Адрес</label>
                        <input type="text" class="form-control" id="address" name="address">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('createClientForm').addEventListener('submit', function(event) {
    event.preventDefault();

      const form = event.target;
      const formData = new FormData(form);
      const jsonData = {};
      formData.forEach((value, key) => jsonData[key] = value);

      fetch('http://localhost:8081/clients', { // Убедитесь, что это правильный эндпоинт для создания клиента
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(jsonData)
      })
      .then(response => {
        if (!response.ok) {
            // Попытаемся прочитать сообщение об ошибке из ответа сервера
            return response.json().then(err => { throw new Error(err.message || "Ошибка создания клиента"); });
        }
        return response.json();
      })
      .then(data => {
        alert("Клиент успешно создан!");
        const createClientModal = bootstrap.Modal.getInstance(document.getElementById('createClientModal'));
        createClientModal.hide(); // Закрываем модальное окно после успешного создания
        window.location.reload(); // Обновим список клиентов
      })
      .catch(error => {
        alert("Произошла ошибка при создании клиента: " + error.message);
      });
    });
</script>
</body>
</html>
